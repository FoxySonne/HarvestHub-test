name: Update project map

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-project-map:
    runs-on: ubuntu-latest

    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Generate project map
        run: node scripts/generate-project-map.js

      - name: Commit updated PROJECT_MAP.md
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Update PROJECT_MAP.md"
          file_pattern: PROJECT_MAP.md
