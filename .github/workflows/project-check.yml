name: Project check

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: project-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Check JavaScript and assets
        run: npm run check
