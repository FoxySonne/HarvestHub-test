<section class="page-section alliance-subpage">
  <button type="button" class="alliance-back-button secondary-button" data-page-path="alliance/members.html">← В штаб</button>
  <section class="card alliance-context-card"><div class="card-header"><div><h3 id="allianceContextName">Союз</h3><p><span id="allianceContextNickname">—</span> · <span id="allianceContextRank">—</span> · <span id="allianceContextRole">—</span></p></div></div></section>
  <div id="allianceMessage" class="alliance-message" hidden></div>

  <section id="participantEditorCard" class="card" hidden>
    <div class="card-header"><div><h3 id="participantEditorTitle">Добавить участника</h3><p>Добавление и редактирование состава.</p></div></div>
    <form id="participantForm" class="participant-form participant-roster-form">
      <input id="participantId" type="hidden" data-no-persist="true"><input id="participantStatus" type="hidden" value="main" data-no-persist="true">
      <label><span>Никнейм</span><input id="participantNickname" type="text" maxlength="80" data-no-persist="true" required></label>
      <label><span>Ранг</span><select id="participantRank" data-no-persist="true"><option value="">Не указан</option><option>Р5</option><option>Р4</option><option>Р3</option><option>Р2</option><option>Р1</option></select></label>
      <label><span>Часовой пояс от Москвы</span><input id="participantTimezone" type="number" min="-12" max="12" step="1" data-no-persist="true"></label>
      <label><span>День рождения</span><input id="participantBirthday" type="text" inputmode="numeric" maxlength="5" placeholder="ДД.ММ" data-no-persist="true"></label>
      <label class="participant-comment-field"><span>Комментарий</span><textarea id="participantComment" rows="3" maxlength="500" data-no-persist="true"></textarea></label>
      <div class="alliance-actions participant-form-actions"><button type="submit">Сохранить</button><button id="participantCancelButton" type="button" class="secondary-button" hidden>Отменить</button></div>
    </form>
  </section>

  <section class="card alliance-list-card">
    <div class="card-header alliance-roster-header"><div><h3>Состав союза</h3><p id="participantCount">0 участников</p></div><div class="alliance-roster-tools"><input id="participantSearch" type="search" placeholder="Поиск по нику" data-no-persist="true"><select id="participantRankFilter" data-no-persist="true"><option value="">Все ранги</option><option>Р5</option><option>Р4</option><option>Р3</option><option>Р2</option><option>Р1</option></select><select id="participantSort" data-no-persist="true"><option value="rank">По рангу</option><option value="nickname">По нику</option></select></div></div>
    <button id="rosterExpandTable" type="button" class="secondary-button alliance-table-open-button">Открыть таблицу целиком</button>
    <div id="rosterTableContainer" class="alliance-table-wrap" data-horizontal-scroll><button id="rosterCloseTable" type="button" class="alliance-fullscreen-close" aria-label="Закрыть таблицу">×</button><table class="alliance-table alliance-roster-table"><thead><tr><th>Никнейм</th><th>Ранг</th><th>День рождения</th><th class="participant-private-column">Часовой пояс</th><th class="participant-private-column">Комментарий</th><th></th></tr></thead><tbody id="participantTableBody"></tbody></table></div>
    <div id="participantEmptyState" class="alliance-empty-state">Пока нет ни одного участника.</div>
  </section>
</section>
