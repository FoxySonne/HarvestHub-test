<section class="page-section alliance-subpage">
  <button type="button" class="alliance-back-button secondary-button" data-page-path="alliance/members.html">← В штаб</button>
  <section class="card alliance-context-card"><div class="card-header"><div><h3 id="allianceContextName">Союз</h3><p><span id="allianceContextNickname">—</span> · <span id="allianceContextRank">—</span> · <span id="allianceContextRole">—</span></p></div></div></section>
  <div id="allianceMessage" class="alliance-message" hidden></div>

  <section class="card alliance-list-card">
    <div class="card-header"><div><h3>Статистика VS</h3><p id="vsStatsCount">0 участников</p></div></div>
    <div class="vs-statistics-controls">
      <label><span>Режим</span><select id="vsStatsMode" data-no-persist="true"><option value="week">Одна неделя</option><option value="compare">Сравнение двух недель</option><option value="period">Период</option></select></label>
      <label data-vs-stats-mode="week"><span>Неделя</span><select id="vsStatsWeek" data-no-persist="true"></select></label>
      <label data-vs-stats-mode="compare" hidden><span>Первая неделя</span><select id="vsStatsWeekA" data-no-persist="true"></select></label>
      <label data-vs-stats-mode="compare" hidden><span>Вторая неделя</span><select id="vsStatsWeekB" data-no-persist="true"></select></label>
      <label data-vs-stats-mode="period" hidden><span>С недели</span><select id="vsStatsPeriodFrom" data-no-persist="true"></select></label>
      <label data-vs-stats-mode="period" hidden><span>По неделю</span><select id="vsStatsPeriodTo" data-no-persist="true"></select></label>
    </div>
    <div class="alliance-roster-tools vs-statistics-filters"><input id="vsStatsSearch" type="search" placeholder="Поиск по нику" data-no-persist="true"><select id="vsStatsRank" data-no-persist="true"><option value="">Все ранги</option><option>Р5</option><option>Р4</option><option>Р3</option><option>Р2</option><option>Р1</option></select><select id="vsStatsCompletion" data-no-persist="true"><option value="">Все участники</option><option value="complete">Выполнили все дни</option><option value="incomplete">Выполнили не все дни</option></select><select id="vsStatsSort" data-no-persist="true"><option value="total">По общей сумме</option><option value="completed">По выполненным дням</option><option value="nickname">По нику</option></select></div>
    <button id="vsStatsExpandTable" type="button" class="secondary-button alliance-table-open-button">Открыть таблицу целиком</button>
    <div id="vsStatsTableContainer" class="alliance-table-wrap vs-table-wrap" data-horizontal-scroll><button id="vsStatsCloseTable" type="button" class="alliance-fullscreen-close" aria-label="Закрыть таблицу">×</button><table class="alliance-table vs-table"><thead id="vsStatsTableHead"></thead><tbody id="vsStatsTableBody"></tbody></table></div>
    <div id="vsStatsEmpty" class="alliance-empty-state">Нет участников для выбранного фильтра.</div>
    <div id="vsStatsSummary" class="vs-summary" hidden></div>
  </section>
</section>
