<section class="page-section alliance-subpage">
  <button type="button" class="alliance-back-button secondary-button" data-page-path="alliance/members.html">← В штаб</button>
  <section class="card alliance-context-card"><div class="card-header"><div><h3 id="allianceContextName">Союз</h3><p><span id="allianceContextNickname">—</span> · <span id="allianceContextRank">—</span> · <span id="allianceContextRole">—</span></p></div></div></section>
  <div id="allianceMessage" class="alliance-message" hidden></div>

  <section id="vsEditorCard" class="card" hidden>
    <div class="card-header"><div><h3 id="vsEditorTitle">Внести результат VS</h3><p id="vsCurrentWeekLabel">Текущая неделя</p></div></div>
    <form id="vsResultForm" class="vs-current-form">
      <label><span>Участник</span><select id="vsParticipant" data-no-persist="true" required></select></label>
      <label><span>День недели</span><select id="vsDay" data-no-persist="true"><option value="0">Понедельник</option><option value="1">Вторник</option><option value="2">Среда</option><option value="3">Четверг</option><option value="4">Пятница</option><option value="5">Суббота</option></select></label>
      <label><span>Дата</span><input id="vsResultDate" type="date" data-no-persist="true" required></label>
      <label class="vs-score-label"><span class="tooltip" data-tooltip="Можно вводить точное число или использовать K, M, B, T. Например: 5720000, 5,72M, 897K, 1,4B или 2T.">Очки</span><input id="vsPoints" type="text" inputmode="decimal" data-no-persist="true"></label>
      <label class="checkbox vs-vacation-field"><input id="vsVacation" type="checkbox" data-no-persist="true"><span>Отпуск</span></label>
      <div class="alliance-actions"><button type="submit">Сохранить результат</button><button id="vsEditCancel" type="button" class="secondary-button" hidden>Отменить</button></div>
    </form>
  </section>

  <section id="vsTargetCard" class="card" hidden>
    <div class="card-header"><div><h3>Ежедневный норматив</h3></div></div>
    <form id="vsTargetForm" class="vs-target-form"><label><span>Норматив</span><input id="vsDailyTarget" type="text" inputmode="decimal" data-no-persist="true"></label><button type="submit">Сохранить</button></form>
  </section>

  <section id="vsBulkCard" class="card" hidden>
    <div class="card-header"><div><h3>Общее редактирование VS</h3><p id="vsBulkWeekLabel">Неделя</p></div></div>
    <p class="vs-bulk-hint">Вводи очки в обычном формате или букву «О» для отпуска. Пустая ячейка не изменяется.</p>
    <div class="alliance-table-wrap" data-horizontal-scroll>
      <table class="alliance-table vs-bulk-table">
        <thead><tr><th>Участник</th><th>Пн</th><th>Вт</th><th>Ср</th><th>Чт</th><th>Пт</th><th>Сб</th></tr></thead>
        <tbody id="vsBulkBody"></tbody>
      </table>
    </div>
    <div class="alliance-actions"><button id="vsBulkSave" type="button">Сохранить изменения</button><button id="vsBulkClose" type="button" class="secondary-button">Закрыть</button></div>
  </section>

  <section class="card alliance-list-card">
    <div class="card-header"><div><h3 id="vsTableWeekTitle">Текущая неделя</h3><p id="vsCount">0 участников</p></div></div>
    <div class="vs-table-controls">
      <label><span>Сортировка</span><select id="vsSort" data-no-persist="true"><option value="total">По сумме за неделю</option><option value="nickname">По имени</option><option value="rank">По рангу</option><option value="day-0">По понедельнику</option><option value="day-1">По вторнику</option><option value="day-2">По среде</option><option value="day-3">По четвергу</option><option value="day-4">По пятнице</option><option value="day-5">По субботе</option></select></label>
      <button id="vsBulkOpen" type="button" class="secondary-button">Изменить общей таблицей</button>
      <button id="vsExpandTable" type="button" class="secondary-button">Открыть таблицу целиком</button>
    </div>
    <div id="vsCurrentTableContainer" class="alliance-table-wrap vs-table-wrap" data-horizontal-scroll><button id="vsCloseTable" type="button" class="alliance-fullscreen-close" aria-label="Закрыть таблицу">×</button><table class="alliance-table vs-table"><thead id="vsTableHead"></thead><tbody id="vsTableBody"></tbody></table></div>
    <div id="vsEmptyState" class="alliance-empty-state">Пока нет участников.</div>
    <div id="vsSummary" class="vs-summary" hidden></div>
  </section>
</section>
