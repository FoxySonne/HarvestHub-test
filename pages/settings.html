<h2>Настройки</h2>

<div class="card">
    <h3>Данные сайта</h3>
    <button class="button" onclick="resetAllSiteData()">Сбросить все данные</button>
</div>

<div class="card">
    <h3>Продвинутый режим</h3>
    <label class="ipk-category-item">
        <span>Включить продвинутый режим</span>
        <span class="ipk-switch">
            <input id="advancedModeToggle" type="checkbox">
            <span class="ipk-switch-track">
                <span class="ipk-switch-thumb">✓</span>
            </span>
        </span>
    </label>
</div>

<div class="card">
    <h3>Профиль</h3>
    <p class="card-text">Профиль теперь открывается через единую кнопку «Профиль» в меню сайта.</p>
    <button type="button" data-account-button>Открыть профиль</button>
</div>
