<h2>Настройки</h2>

<div class="card">

    <h3>Кэш сайта</h3>

    <button class="button" onclick="clearSiteCache()">

        Очистить кэш и обновить страницу

    </button>

</div>

<div class="card">

    <h3>Продвинутый режим</h3>

    <label class="ipk-category-item">
        <span>Включить продвинутый режим</span>
        <span class="ipk-switch">
            <input id="advancedModeToggle" type="checkbox">
            <span class="ipk-switch-track">
                <span class="ipk-switch-thumb">✓</span>
            </span>
        </span>
    </label>

</div>
