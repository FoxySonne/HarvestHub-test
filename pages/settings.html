<h2>Настройки</h2>

<div class="card">

    <h3>Кэш сайта</h3>

    <button class="button" onclick="clearSiteCache()">

        Очистить кэш и обновить страницу

    </button>

</div>

<div class="card">

    <h3>Продвинутый режим</h3>

    <label class="ipk-category-item">
        <span>Включить продвинутый режим</span>
        <span class="ipk-switch">
            <input id="advancedModeToggle" type="checkbox">
            <span class="ipk-switch-track">
                <span class="ipk-switch-thumb">✓</span>
            </span>
        </span>
    </label>

</div>

<div class="card advanced-only">

    <h3>Профиль</h3>

    <p id="profileStatus" class="card-text">Профиль не выбран</p>

    <div class="form">

        <label class="form-group">
            <span>Никнейм</span>
            <input id="profileNickname" type="text" autocomplete="username">
        </label>

        <label class="form-group">
            <span>Номер штата</span>
            <input id="profileState" type="number" min="1" inputmode="numeric">
        </label>

        <label class="form-group">
            <span>Код из 4 цифр</span>
            <input id="profilePin" type="password" inputmode="numeric" maxlength="4" autocomplete="current-password">
        </label>

        <div class="button-group">
            <button type="button" onclick="createProfileFromSettings()">Создать профиль</button>
            <button type="button" onclick="loginProfileFromSettings()">Выбрать профиль</button>
            <button type="button" onclick="logoutProfileFromSettings()">Отключить профиль</button>
        </div>

    </div>

    <p id="profileMessage" class="card-text"></p>

</div>
