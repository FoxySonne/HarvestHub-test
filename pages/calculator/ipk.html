<section class="page-section ipk-page">

  <h1>Игра по-крупному</h1>

  <section class="ipk-mobile-categories card">
    <div class="card-header">
      <h3>Категории</h3>
    </div>

    <div id="ipkMobileCategoriesList" class="ipk-category-list"></div>
  </section>

  <section class="ipk-total-card card" data-no-collapse="true">
    <span>Получу всего:</span>
    <strong id="ipkTotal">0</strong>
  </section>

  <section class="ipk-layout">
    <div id="ipkCards" class="ipk-cards"></div>

    <aside class="ipk-desktop-categories card">
      <h3>Категории</h3>
      <div id="ipkDesktopCategoriesList" class="ipk-category-list"></div>
    </aside>
  </section>

  <div class="calculator-data-actions">
    <button type="button" class="danger-button" data-calculator-reset>Удалить данные</button>
    <p data-calculator-reset-status aria-live="polite"></p>
  </div>

</section>
