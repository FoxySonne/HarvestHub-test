    <span class="day-label">День недели:</span>

      <!-- заполняется через JS -->

    </select>

  </div>

  <!-- Основной блок -->

    <!-- Заголовки колонок -->

      <span class="col-right">Дуэль союза</span>

    </div>

    <!-- ЕДИНЫЙ список действий -->

    <div id="actionsList" class="actions-list"></div>

    <!-- Правая часть (результаты) -->

    <div class="results">

      <h3>Всего Турбочерепашка:</h3>

      <div class="result-box"></div>

      <h3>Всего VS Дуэль союза:</h3>
