<div class="turbo-container">

  <h1 class="title">

    Турбочерепашка & VS Дуэль союза

  </h1>

  <!-- День недели -->

  <div class="day-block">

    <span class="day-label">День недели:</span>

    <select id="daySelector" class="day-select">

      <!-- будет заполняться через JS -->

    </select>

  </div>

  <!-- Основной блок -->

  <div class="turbo-content">

    <!-- Левая колонка -->

    <div class="column turtle">

      <h3>Черепашка</h3>

      <div id="turtleList" class="list"></div>

    </div>

    <!-- Центральная колонка -->

    <div class="column vs">

      <h3>Дуэль союза</h3>

      <div id="vsList" class="list"></div>

    </div>

    <!-- Правая часть -->

    <div class="results">

      <h3>Всего Турбочерепашка:</h3>

      <div class="result-box"></div>

      <h3>Всего VS Дуэль союза:</h3>

      <div class="result-box"></div>

    </div>

  </div>

</div>
