</head>

        <div class="menu-button" id="openMenu">☰</div>

        <div class="topbar-title">
            HarvestHub
        </div>

    </header>

    <!-- Основная сетка сайта -->

        <!-- Левое меню -->

            <div id="sidebar-container"></div>

        </aside>

        <!-- Центральная рабочая область -->

             <div id="main-title-container"></div>
             <div id="page-content"></div>
        </main>

        <!-- Правая колонка -->
        <aside class="right" id="right-sidebar">

            <div id="rightbar-container"></div>

        </aside>

    </div>

    <!-- JavaScript -->

    <script src="js/menu.js"></script>

    <script src="js/loader.js"></script>
