<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HarvestHub</title>

<style>
:root {
    --bg: #0f1115;
    --panel: #151922;
    --card: #1a1f2a;
    --text: #e6e6e6;
    --button: #3a7a3a;
    --lightgreen: #8BEA63;
}

* { box-sizing: border-box; }

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
}

/* ===== TOPBAR ===== */
.topbar {
    display: flex;
    align-items: center;
    gap: 15px;
    padding: 16px 20px;
    background: var(--panel);
    position: sticky;
    top: 0;
    z-index: 100;
}

.menu-button {
    font-size: 28px;
    cursor: pointer;
}

/* ===== LAYOUT ===== */
.container {
    display: block;
}

/* ===== SIDEBAR ===== */
.left {
    position: fixed;
    top: 0;
    left: -260px;
    width: 240px;
    height: 100vh;
    background: var(--panel);
    padding: 20px;
    transition: 0.3s;
    z-index: 1000; /* ВСЕГДА поверх */
}

.left.active {
    left: 0;
}

/* overlay */
.overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    opacity: 0;
    pointer-events: none;
    transition: 0.2s;
    z-index: 900;
}

.overlay.active {
    opacity: 1;
    pointer-events: all;
}

/* MENU */
.logo {
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 10px;
}

.menu-item {
    display: block;
    padding: 12px 0;
    border-bottom: 1px solid #2b3140;
    color: #cfcfcf;
    text-decoration: none;
}

.menu-item.active {
    color: var(--lightgreen);
    font-weight: bold;
}

/* ===== MAIN ===== */
.main {
    padding: 20px;
}

.hero {
    background: var(--card);
    padding: 24px;
    border-radius: 14px;
    text-align: center;
}

.button {
    display: inline-block;
    padding: 10px 14px;
    margin: 5px;
    background: var(--button);
    border-radius: 8px;
    color: white;
    text-decoration: none;
}

/* RIGHT (мобилка) */
.right {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 24px;
}

.box {
    background: var(--card);
    border-radius: 12px;
    padding: 14px;
}

/* ===== DESKTOP ===== */
@media (min-width: 900px) {

    .topbar {
        display: none;
    }

    .container {
        display: grid;
        grid-template-columns: 220px 1fr 260px;
        height: 100vh;
    }

    .left {
        position: static;
        left: 0;
        height: auto;
    }

    .overlay {
        display: none;
    }

    .main {
        padding: 40px;
    }

    .right {
        display: block;
        margin-top: 0;
    }

    .box {
        margin-bottom: 20px;
    }
}
</style>
</head>

<body>

<!-- TOPBAR -->
<div class="topbar">
    <div class="menu-button" id="openMenu">☰</div>
    <div>HarvestHub</div>
</div>

<!-- OVERLAY -->
<div class="overlay" id="overlay"></div>

<!-- ОСНОВНОЙ LAYOUT -->
<div class="container">

    <!-- SIDEBAR (ВСЕГДА внутри container) -->
    <div class="left" id="sidebar">

        <div id="sidebar-container">
</div></div>

    <!-- MAIN -->
    <div class="main">

        <div class="hero">
            <h1>Stop fighting.</h1>
            <h1><span style="color:var(--lightgreen)">Start farming.</span></h1>

            <p>Ваш лучший помощник для Tiles Survive</p>

            <a href="knowledge.html" class="button">База знаний</a>
            <a href="calculator.html" class="button">Калькулятор</a>
          

         </div>

        <!-- Блок с центрированными заголовками -->
        <div class="centered-titles">
            <h2>Игра по крупному</h2>
            <h2>Турбочерепашка&VS</h2>
        </div>

    </div>

    <!-- RIGHT -->
    <div class="right">

        <div class="box">
            <h4>Быстрые ссылки</h4>
            <p>Расписание</p>
            <p>Герои</p>
            <p>Стоимость построек</p>
        </div>

        <div class="box">
            <h4>Совет дня</h4>
            <p>Бей крокодила!</p>
        </div>

    </div>

</div>

<script>
const openBtn = document.getElementById('openMenu');
const sidebar = document.getElementById('sidebar');
const overlay = document.getElementById('overlay');

openBtn.onclick = () => {
    sidebar.classList.add('active');
    overlay.classList.add('active');
};

overlay.onclick = () => {
    sidebar.classList.remove('active');
    overlay.classList.remove('active');
};

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
        sidebar.classList.remove('active');
        overlay.classList.remove('active');
    }
});
</script>
<script>
fetch('sidebar.html')
  .then(res => res.text())
  .then(data => {
    document.getElementById('sidebar-container').innerHTML = data;
  });
</script>

</body>
</html>
