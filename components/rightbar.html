<div class="box quick-links-box">
    <h4>Быстрые ссылки</h4>
    <div id="quickLinks" class="quick-links-list">
        <p class="quick-links-empty">Пока нет статистики переходов</p>
    </div>
</div>

<div class="box desktop-profile-box" id="desktopProfileBox">
    <h4>Профиль</h4>
    <div id="desktopProfileContent">
        <p class="desktop-profile-text">Сохраняйте данные и используйте их на разных устройствах.</p>
        <button type="button" class="account-trigger desktop-profile-button" data-account-button>
            Войти или создать профиль
        </button>
    </div>
</div>

<div class="box time-converter-box" oninput="window.harvestHubUpdateTimeConverter && window.harvestHubUpdateTimeConverter()" onchange="window.harvestHubUpdateTimeConverter && window.harvestHubUpdateTimeConverter()">
    <h4>Перевод времени</h4>

    <div class="time-converter-fields">
        <label class="time-converter-field">
            <span>Дни</span>
            <input id="timeConverterDays" type="number" min="0" inputmode="numeric" value="0">
        </label>

        <label class="time-converter-field">
            <span>Часы</span>
            <input id="timeConverterHours" type="number" min="0" inputmode="numeric" value="0">
        </label>

        <label class="time-converter-field">
            <span>Минуты</span>
            <input id="timeConverterMinutes" type="number" min="0" inputmode="numeric" value="0">
        </label>

        <label class="time-converter-field">
            <span>Секунды</span>
            <input id="timeConverterSeconds" type="number" min="0" inputmode="numeric" value="0">
        </label>
    </div>

    <div class="time-converter-result" aria-live="polite">
        <div>
            <span>Итого в минутах:</span>
            <strong id="timeConverterTotalMinutes">0</strong>
        </div>
        <div>
            <span>Формат:</span>
            <strong id="timeConverterFormatted">00д 00:00:00</strong>
        </div>
    </div>
</div>

<div class="box">
    <h4>Совет дня</h4>
    <p>Бей крокодила!</p>
</div>
